  <head>
    <meta charset="UTF-8" />

    <meta name="format-detection" content="telephone=no" />

    <!-- ── Preconnect / DNS prefetch ────────────────────────────────────── -->
    <link rel="preconnect" href="https://aviationweather.gov" crossorigin />
    <link rel="dns-prefetch" href="https://aviationweather.gov" />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    <link rel="dns-prefetch" href="https://basemaps.cartocdn.com" />

    <!-- ── Primary SEO ───────────────────────────────────────────────────── -->
    <title>AeroWind Tracker — Real-Time Aviation Weather Map & AI Hazard Intelligence</title>
    <meta name="description" content="Live aviation weather for US pilots. Real-time METAR wind data, radar overlays, AI-powered wind shear detection, IFR hazard alerts, icing risks, and Gemini-synthesized flight briefings — all on one interactive map." />
    <meta name="keywords" content="aviation weather, real-time wind map, METAR, pilot weather briefing, wind shear, IFR conditions, icing risk, radar overlay, flight weather, AeroWind, aeroguard, aviation AI, winds aloft, PIREP, fog risk, turbulence, flight planning weather" />
    <meta name="author" content="AeroWind Tracker" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#0a1122" />
    <link rel="canonical" href="https://aerowindtracker.vercel.app/" />

    <!-- ── Open Graph ────────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />

    <meta name="twitter:card"        content="summary_large_image" />

    <meta name="twitter:title"       content="AeroWind Tracker — Real-Time Aviation Weather & AI Hazard Intelligence" />

    <!-- ── Structured Data — WebApplication ─────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "AeroWind Tracker",
      "url": "https://aerowindtracker.vercel.app/",
      "description": "Real-time aviation weather map for US pilots featuring live METAR wind data, radar overlays, AI-powered wind shear detection, IFR hazard alerts, icing risk zones, and Gemini-synthesized flight briefings.",
      "applicationCategory": "UtilitiesApplication",
      "applicationSubCategory": "Weather Application",
      "operatingSystem": "Web",
      "inLanguage": "en-US",
      "browserRequirements": "Requires JavaScript. Works in all modern browsers.",
      "datePublished": "2025-01-01",
      "dateModified": "2026-03-25",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://aerowindtracker.vercel.app/?q={airport_icao}"
        },
        "query-input": "required name=airport_icao"
      },
      "featureList": [
        "Real-time METAR weather data",
        "Live radar overlay",
        "Wind barb map with altitude layers",
        "AI wind shear corridor detection",
        "IFR cluster identification",
        "Structural icing risk zones",
        "Fog risk detection",
        "AI-synthesized pilot briefings via Gemini",
        "Airport search and crosswind calculator",
        "PIREP turbulence and icing reports"
      ],
      "screenshot": "https://aerowindtracker.vercel.app/og-image.png",
      "creator": {
        "@type": "Organization",
        "name": "AeroWind Tracker"
      }
    }
    </script>

    <!-- ── Structured Data — FAQPage ────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "datePublished": "2025-01-01",
      "dateModified": "2026-03-25",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is AeroWind Tracker?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AeroWind Tracker is a free real-time aviation weather map that displays live METAR wind data, radar, and AI-detected hazards like wind shear, IFR conditions, icing risks, and turbulence across the continental United States."
          }
        },
        {
          "@type": "Question",
          "name": "How often is the weather data updated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Weather data including METARs, winds aloft, and PIREPs are refreshed every 5 minutes from the FAA Aviation Weather Center API."
          }
        },
        {
          "@type": "Question",
          "name": "What AI features does AeroWind Tracker use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AeroWind Tracker uses Google Gemini AI to synthesize live weather findings into plain-English pilot briefings, parse severe PIREPs, and power an interactive Pilot Copilot chatbot for flight planning questions."
          }
        },
        {
          "@type": "Question",
          "name": "Is AeroWind Tracker free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, AeroWind Tracker is completely free and requires no account or login."
          }
        },
        {
          "@type": "Question",
          "name": "What airports does AeroWind Tracker cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AeroWind Tracker covers all METAR-reporting airports across the continental United States, including major international airports, regional airports, and general aviation fields."
          }
        },
        {
          "@type": "Question",
          "name": "Can AeroWind Tracker detect wind shear?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The WindAgent automatically analyzes adjacent METAR stations and flags wind shear corridors where speed differences exceed 15 knots or directional shifts exceed 45 degrees between nearby airports."
          }
        }
      ]
    }
    </script>
