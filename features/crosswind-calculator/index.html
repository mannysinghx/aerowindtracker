    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a crosswind component?",
          "acceptedAnswer": { "@type": "Answer", "text": "A crosswind component is the portion of the wind blowing perpendicular to the runway centerline. If the wind is directly across the runway at 20 knots, the crosswind component is 20 knots. If the wind is at a 30-degree angle to the runway, the crosswind component is 20 × sin(30°) = 10 knots. Pilots must stay within their aircraft's demonstrated crosswind limit." }
        },
        {
          "@type": "Question",
          "name": "How do I calculate crosswind for landing?",
          "acceptedAnswer": { "@type": "Answer", "text": "To calculate crosswind: 1) Find the angular difference between wind direction and runway heading. 2) Multiply wind speed by the sine of that angle to get the crosswind component. 3) Multiply wind speed by the cosine of that angle to get the headwind component. AeroWindy does this automatically using live METAR data for every runway at any searched US airport." }
        },
        {
          "@type": "Question",
          "name": "What is a typical crosswind limit for a small aircraft?",
          "acceptedAnswer": { "@type": "Answer", "text": "Most single-engine trainers like the Cessna 172 have a demonstrated crosswind limit of 15 knots. The Piper PA-28 Cherokee is similar at around 17 knots. Larger aircraft have higher limits — the Boeing 737-800 is certified to 36 knots crosswind. Always check your specific aircraft's POH/AFM for the demonstrated crosswind component." }
        },
        {
          "@type": "Question",
          "name": "Which runway should I use for landing?",
          "acceptedAnswer": { "@type": "Answer", "text": "Always land into the wind when possible to minimize groundspeed and crosswind component. AeroWindy automatically calculates the best runway at any US airport based on the current METAR wind direction and speed, showing you which runway gives the smallest crosswind and largest headwind component." }
        },
        {
          "@type": "Question",
          "name": "What is a headwind component?",
          "acceptedAnswer": { "@type": "Answer", "text": "The headwind component is the portion of wind directly opposing the aircraft's takeoff or landing direction. A direct 20-knot headwind means the aircraft's groundspeed is reduced by 20 knots at a given airspeed, shortening takeoff and landing distances. AeroWindy shows both crosswind and headwind components for every runway." }
        }
      ]
